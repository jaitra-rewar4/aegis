name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        # The approval API (api/server.py) and its tests need FastAPI/uvicorn/pydantic,
        # which live in api/requirements.txt (kept separate so the core stays lean).
      - run: pip install -r api/requirements.txt
      - run: python -m pytest tests/ -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx tsc --noEmit
      # The TS engine parity vectors and the in-browser console / red-team suites.
      - run: npm test
      - run: npm run build

# default.yaml — the example policy pack (ADR 0003 §e).
#
# Reproduces Phase-1 demo behavior under an explicit default-deny floor:
#   - destructive execute_sql is DENIED,
#   - all other execute_sql, lookup_customer, and calculator calls are ALLOWED,
#   - any tool no rule names is DENIED by `default: deny`.
#
# Precedence is first-match-wins in this file order (ADR 0003 §d): the destructive
# SQL DENY is placed ABOVE the broad execute_sql ALLOW, so destructive statements hit
# the DENY and everything else on execute_sql falls through to the ALLOW.

version: 1
default: deny

rules:
  # 1. Destructive SQL — DENY. Placed first so it wins over sql.allow_other below.
  - id: sql.deny_destructive
    rationale: >-
      STOPGAP, NOT REAL SQL SAFETY. Denies execute_sql when the statement contains a
      destructive keyword (DROP/DELETE/TRUNCATE/ALTER) under the exact Phase-1
      keyword scan. This is a documented-gap keyword stopgap pending a real SQL
      parser: the negative form (allow-unless-keyword) still lets comment-splitting,
      unicode/hex look-alikes, and unlisted verbs (UPDATE/MERGE/GRANT...) reach ALLOW,
      exactly as documented in tests/PHASE1_FINDINGS.md (gap classes 7a/7c/7d). The
      secure form is a positive "allow only provably-safe SQL" rule, deferred to a
      real parser. Default-deny closes the unknown-tool gap, NOT this one.
    tool: execute_sql
    when:
      sql:
        contains_keyword: [DROP, DELETE, TRUNCATE, ALTER]
    effect: DENY

  # 2. Any other execute_sql — ALLOW. Reached only when rule 1 did not match.
  - id: sql.allow_other
    rationale: >-
      Allows non-destructive execute_sql (SELECT, INSERT of seed data, etc.). This is
      the negative-form companion to sql.deny_destructive above: anything that did not
      trip the destructive-keyword DENY is permitted, reproducing Phase-1 behavior.
    tool: execute_sql
    effect: ALLOW

  # 3. lookup_customer — ALLOW. Read-only, always allowed in 2a.
  - id: customers.allow_lookup
    rationale: >-
      Allows lookup_customer unconditionally. It is a read-only customer lookup with
      no destructive capability in 2a. (In 2b this same read becomes the "read
      sensitive" half of the read->send exfiltration chain a trajectory rule will
      guard — but that is future work, not enforced here.)
    tool: lookup_customer
    effect: ALLOW

  # 4. calculator — ALLOW. Pure arithmetic, always allowed.
  - id: math.allow_calculator
    rationale: >-
      Allows calculator unconditionally. It is pure arithmetic with no side effects
      and no access to data or external systems.
    tool: calculator
    effect: ALLOW

  # 5. send_email exfil — DENY. The 2b trajectory rule (ADR 0004 §e).
  #    Placed FIRST among the send_email rules so it wins when it matches; the order
  #    BETWEEN this rule and email.allow_known_domains below is load-bearing
  #    (first-match-wins, ADR 0003 §d). Order relative to the four rules above is
  #    irrelevant — they name different tools.
  - id: email.deny_exfil_after_read
    rationale: >-
      Blocks egress to any non-internal recipient once a sensitive customer read was
      ALLOWed earlier in this run — the read->send exfiltration chain, caught at the
      action layer on the recorded sequence of concrete calls (ADR 0004). It keys on
      TOOL IDENTITY, not on data provenance: it fires because a lookup_customer was
      ALLOWed and a non-internal send is now proposed, NOT because the send's body
      actually carries the read data (body content is never inspected). One ALLOWed
      read taints ALL later non-internal sends for the rest of the run — coarse and
      fail-safe by design: a false DENY costs a refused benign send; a false ALLOW
      costs a leak, so we choose the cheaper failure.
    tool: send_email
    after:
      tool: lookup_customer
    when:
      to:
        domain_not_in: [internal.example.com]
    effect: DENY

  # 6. send_email to known domains — ALLOW. Reached only when rule 5 did not match.
  - id: email.allow_known_domains
    rationale: >-
      Allows sends to known-good internal and partner domains. Reached only when the
      exfil rule above did not match (no ALLOWed lookup_customer earlier in the run, or
      the recipient is internal.example.com). Any other recipient falls through to
      default: deny.
    tool: send_email
    when:
      to:
        domain_in: [internal.example.com, partner.example.com]
    effect: ALLOW
